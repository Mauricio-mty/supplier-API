services:
  supplier-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supplier-api
    ports:
      - "3001:3000"
    environment:
      - DB_HOST=postgres # Cambia según tu configuración
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_DATABASE=supplier_db
      - JWT_SECRET=super-secret-key
    restart: always
